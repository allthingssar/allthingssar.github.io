# ----------------------------------------------------
# Site settings
# ----------------------------------------------------
title: "All Things SAR"
description: >-
  Between the math in the journal and the code in your pipeline,  there's a gap. This blog lives there.
baseurl: ""                          # subpath, e.g. "/blog" — leave empty for username.github.io
url: "https://allthingsar.github.io"

# ----------------------------------------------------
# Build settings
# ----------------------------------------------------
markdown: kramdown
highlighter: rouge
theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# ----------------------------------------------------
# Permalinks
# ----------------------------------------------------
# Posts placed in nested folders under _posts (e.g. _posts/level-3-estimation-algorithms/)
# are automatically tagged with that folder name as a category in Jekyll —
# no extra front matter needed for that part.
permalink: /:categories/:year/:month/:day/:title/

# ----------------------------------------------------
# Front matter defaults
# ----------------------------------------------------
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      math: true        # flips on MathJax include (see note below) for every post

# ----------------------------------------------------
# Navigation (used by the minima theme)
# ----------------------------------------------------
header_pages:
  - about.md

# ----------------------------------------------------
# Exclude from the generated site
# ----------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
